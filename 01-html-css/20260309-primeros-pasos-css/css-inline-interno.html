<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeros pasos CSS (inline + interno)</title>
    <style>
        p {
            font-size: 24px;
        }

        .text-bold {
           font-weight: bold;
        }

        #first-paragraph {
            color: #1b8246;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1 style="color: red;">Primera página de html</h1>
    <p id="first-paragraph">Primer párrafo</p>
    <p>Segundo párrafo</p>
    <p class="text-bold">Un párrafo en negrita</p>
    <p class="text-bold">Y otro párrafo en negrita</p>
    <p>Tercer párrafo</p>
</body>
</html>
