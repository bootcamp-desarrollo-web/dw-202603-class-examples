<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selectores - hijos directos e indirectos</title>
</head>
<body>
  <div class="container">
    div with class "container"
    <div>
      <div>
        Hello World
      </div>
    </div>
  </div>
</body>
</html>

<style>
  .container {
    border: 1px solid black;
    background-color: pink;
    padding: 30px;
    width: 400px;
    text-align: center;
    margin: 50px auto;
  }

  .container div {
    border: 1px dashed black;
    background-color: aquamarine;
    margin: 20px;
    padding: 20px;
  }

  .container > div {
    border: 1px dotted black;
    background-color: rgb(200, 194, 247);
  }
</style>
