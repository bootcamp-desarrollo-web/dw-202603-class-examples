<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tablas</title>
</head>
<body>
  <table>
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Apellido</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Ana</td>
        <td>Moreno</td>
      </tr>
      <tr>
        <td class="purple-bg">Beatriz</td>
        <td>Serrano</td>
      </tr>
    </tbody>
  </table>

</body>
</html>

<style>
  table, th, td {
    border: 1px solid black;
    border-collapse: collapse;
    padding: 5px 20px;
  }

  th {
    background-color: yellow;
    color: green;
  }

  th, td {
    text-align: center;
  }

  .purple-bg {
    background-color: purple;
    color: white;
  }
</style>
